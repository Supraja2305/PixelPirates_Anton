# docker-compose.yml
# ============================================================
# Docker Compose for local development with all services
# Includes: Backend, Supabase (via volume), Redis
# ============================================================

version: '3.8'

services:
  # AntonRX Backend API
  backend:
    build: ./antonrx_backend
    container_name: antonrx-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4-turbo
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - MAX_UPLOAD_SIZE_MB=10
      - ALLOWED_FILE_TYPES=pdf,html,htm,png,jpg,jpeg,docx,doc
      - RATE_LIMIT_PER_MINUTE=60
      - RATE_LIMIT_EXTRACTION_PER_DAY=1000
    volumes:
      - ./antonrx_backend:/app
      - upload_storage:/app/storage/uploads
    depends_on:
      - redis
    networks:
      - anton-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: antonrx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - anton-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  upload_storage:
    driver: local
  redis_data:
    driver: local

networks:
  anton-network:
    driver: bridge
